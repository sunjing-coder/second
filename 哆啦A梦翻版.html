<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兔兔</title>
    <style>
        .top{
            display:flex;
            flex-direction: column;
        }
        .ear{
            display:flex;
            flex-direction: row;
            color:black;
            margin:0;
        }
        .wai{
            width:36px;
            height:100px;
            margin-right:15px;
            border-radius: 60%;
            border-top:1px solid #000000;
            border-left:1px solid #000000;
            border-right:1px solid #000000;
        }
        .nei{
            width:18px;
            height:66px;
            margin:11px;
            border-radius: 60%;
            border-top:1px solid #000000;
            border-left:1px solid #000000;
            border-right:1px solid #000000;     
            background-color:pink;       
        }
        .head{
            margin-left: 100px;
            display:flex;
            flex-direction: column;
            width:105px;
            height:110px;
            border-radius: 60%;
            border:0.8px solid #000000;
            margin:0;
        }
        .eye{
            display:flex;
            flex-direction: row;
        }
        div{
            margin:0;
            padding:0;
        }
        .eyes{
            margin-top:25px;
            margin-left:15px;
            width:22px;
            height:25px;
            border-radius:100%;
            border:1px solid #000000;   
        }
        .e1{
            margin:10px;
            width:10px;
            height:10px;
            border-radius:100%;
            border:1px solid #000000;   
            background-color:#000000;
        }
        .nose{
            margin-top: 5px;
            margin-left:43px;
            width:15px;
            height:10px;
            border-radius:50%;
            border-bottom:1.5px solid #000000;
            background-color: pink;
        }
        .mouth{
            margin-top: 8px;
            margin-left:33px;
            width:38px;
            height:10px;
            border-radius:50%;
            border:1.5px solid #000000;
            background-color: pink;

        }
        .mid{
            display:flex;
            flex-direction: row;
        }
        .hands{
            margin:0;
            width:15px;
            height:100px;
            border-radius:50%;
            border-bottom:0.8px solid #000000;
            border-right:0.8px solid #000000;

        }
        .body{
            margin:0;
            width:100px;
            height:160px;
            border-radius:50%;
            border:0.8px solid #000000;

        }
        .bo1{
            margin-top:55px;
            margin-left: 10px;
            width:75px;
            height:88px;
            border-radius: 60%;
            border:0.8px solid #000000;
            background-color: pink;

        }
        .bottom{
            display:flex;
            flex-direction: row;
        }
        .foot{
            margin-left:25px;
            width:30px;
            height:130px;
            border-radius:50%;
            border-bottom:0.8px solid #000000;
            border-right:0.8px solid #000000;
            border-left:0.8px solid #000000;

        }

    </style>
</head>
<body>
   <div class="top"> 
        <div class="ear">
            <span class="wai">
                <div class="nei"></div>
            </span>
            <span class="wai">
                <div class="nei"></div>
            </span>
        </div>
        <div class="head">
            <div class="eye">
                <div class="eyes">
                    <div class="e1"></div>
                </div>
                <div class="eyes">
                    <div class="e1"></div>
                </div>
            </div>
            <div class="nose"></div>
            <div class="mouth"></div>
        </div>
   </div>
   <div class="mid">
        <div class="hands"></div>
        <div class="body">
            <div class="bo1"></div>
        </div>
        <div class="hands"></div>
    </div>
    <div class="bottom">
        <div class="foot"></div>
        <div class="foot"></div>
    </div>
    
</body>
</html>
